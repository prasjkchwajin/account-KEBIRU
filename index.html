<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>教师联谊会财务系统</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
        }

        body {
            background: #eef3ea;
            margin: 0;
            padding: 20px 16px;
            min-height: 100vh;
        }

        /* 登录页面样式 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 70, 32, 0.94);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .login-card h1 { color: #1e4620; margin-bottom: 8px; }
        .login-input { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1px solid #cfe3cf; font-size: 1rem; margin-bottom: 12px; }
        .checkbox-label { display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #2e5c2a; cursor: pointer; }
        .login-btn { background: #2e7d32; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 12px; }
        .login-btn:hover { background: #1b5e20; }
        .error-msg { color: #c0392b; font-size: 0.8rem; margin-top: 12px; }

        /* 主内容 */
        .main-content { display: none; width: 100%; max-width: 1600px; margin: 0 auto; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .card { background: white; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,32,0,0.08); padding: 20px 24px; margin-bottom: 24px; }
        .card-title { font-size: 1.5rem; font-weight: 600; color: #1e4620; border-left: 6px solid #3c9e3a; padding-left: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: space-between; }
        .badge { background: #e9f5e9; color: #2c6e2c; padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; }

        /* 项目切换栏 */
        .ledger-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #d4e2ca;
        }
        .ledger-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .ledger-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0f5ec;
            border: 1px solid #c8dfbc;
            border-radius: 40px;
            padding: 4px 8px 4px 16px;
        }
        .ledger-item.active {
            background: #2e7d32;
            border-color: #2e7d32;
        }
        .ledger-item.active .ledger-name {
            color: white;
        }
        .ledger-name {
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            color: #2e5c2a;
        }
        .ledger-item.active .ledger-name {
            color: white;
        }
        .ledger-name:hover {
            text-decoration: underline;
        }
        .delete-ledger-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 30px;
            color: #c0392b;
            font-weight: bold;
            width: auto;
            line-height: 1;
        }
        .delete-ledger-btn:hover {
            background: rgba(192, 57, 43, 0.15);
        }
        .add-ledger {
            background: white;
            border: 1px dashed #5f9e4b;
            color: #2e7d32;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .add-ledger:hover {
            background: #e8f5e9;
        }

        .form-grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-bottom: 16px; }
        .input-group { flex: 1; min-width: 130px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #2b4f2b; margin-bottom: 4px; }
        input, select, button { width: 100%; padding: 8px 12px; border-radius: 20px; border: 1px solid #cfe3cf; background: white; font-size: 0.9rem; }
        button { background: #2e7d32; color: white; border: none; font-weight: 600; cursor: pointer; }
        button:hover { background: #1b5e20; }
        .btn-outline { background: white; border: 1px solid #2e7d32; color: #2e7d32; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; width: auto; }

        .filter-bar { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-group input, .filter-group select { width: auto; max-width: 140px; }

        /* 收支明细表 - 固定高度滚动（仅屏幕显示） */
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 24px;
            border: 1px solid #e2f0df;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #eef5ea; padding: 12px 8px; text-align: left; font-weight: 600; border-bottom: 2px solid #c8e0c4; position: sticky; top: 0; background-color: #eef5ea; z-index: 10; }
        td { padding: 10px 8px; border-bottom: 1px solid #e2f0df; vertical-align: middle; }
        .amount-in { color: #2b6e2f; font-weight: 600; }
        .amount-out { color: #c0392b; font-weight: 600; }
        .action-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; padding: 4px 8px; width: auto; }
        .edit-btn { color: #2c6e2c; }
        .delete-btn { color: #c0392b; }
        .payment-badge { background: #f1f3f4; padding: 4px 8px; border-radius: 30px; font-size: 0.7rem; display: inline-block; }

        /* 结算单样式 */
        .statement-modern { background: #fff; border: 1px solid #d4e2ca; border-radius: 28px; overflow: hidden; }
        .statement-header { text-align: center; padding: 20px; border-bottom: 2px solid #c8dfbc; background: #fafef7; }
        .statement-header h2 { margin: 0; color: #1e4620; font-size: 1.3rem; }
        .statement-header p { margin: 5px 0 0; color: #5a7952; font-size: 0.8rem; }
        .statement-period { font-size: 0.75rem; color: #6f8f63; margin-top: 6px; }
        .statement-split { display: flex; flex-wrap: wrap; }
        .split-left, .split-right { flex: 1; min-width: 260px; }
        .split-left { border-right: 1px solid #ddebd0; }
        .split-header { padding: 12px 16px; font-weight: 700; font-size: 1rem; background: #f7fbf4; border-bottom: 1px solid #cde0c4; }
        .split-left .split-header { color: #2b6e2f; }
        .split-right .split-header { color: #b13b2c; }
        /* 屏幕显示时限制高度，便于滚动 */
        .transaction-list { 
            padding: 8px 0; 
            max-height: 350px;
            overflow-y: auto;
        }
        .transaction-item { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f0f5eb; font-size: 0.8rem; }
        .item-left { flex: 2; }
        .item-date { font-size: 0.7rem; color: #6f8e61; }
        .item-desc { font-weight: 500; }
        .item-payment { font-size: 0.65rem; background: #f2f6ef; padding: 2px 6px; border-radius: 20px; display: inline-block; margin-top: 3px; }
        .item-remark { font-size: 0.65rem; color: #8cae7c; margin-top: 3px; }
        .item-right { text-align: right; font-weight: 600; }
        .amount-positive { color: #2b6e2f; }
        .amount-negative { color: #c0392b; }
        .split-footer { background: #fcfdfa; padding: 12px 16px; border-top: 2px solid #deecD5; font-weight: 700; display: flex; justify-content: space-between; }
        .grand-total { background: #eef4e9; padding: 14px 20px; display: flex; justify-content: flex-end; gap: 24px; flex-wrap: wrap; font-weight: 700; border-top: 2px solid #c8dfbc; }
        .print-actions { display: flex; justify-content: flex-end; gap: 16px; margin-top: 16px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; max-width: 550px; width: 90%; padding: 24px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
        
        footer { text-align: center; font-size: 0.7rem; color: #7f9a6e; margin-top: 20px; padding-top: 8px; border-top: 1px solid #d4e2ca; }
        .empty-statement { text-align: center; padding: 30px; color: #8aa77d; }
        
        /* ========== 打印样式 - 完整显示所有记录 ========== */
        @media print {
            /* 隐藏所有不需要打印的元素 */
            body * {
                visibility: hidden;
            }
            /* 只显示结算单区域 */
            .statement-modern, .statement-modern * {
                visibility: visible;
            }
            .statement-modern {
                position: relative;
                top: 0;
                left: 0;
                margin: 0;
                padding: 20px;
                width: 100%;
                border: 1px solid #ccc;
                box-shadow: none;
                background: white;
            }
            /* 隐藏打印按钮和其他操作元素 */
            .print-actions, .no-print, .ledger-bar, .filter-bar, .action-btn, .modal, .card-title .badge, footer {
                display: none !important;
            }
            /* 关键修复：打印时移除高度限制，显示全部内容 */
            .transaction-list {
                max-height: none !important;
                overflow: visible !important;
                display: block !important;
            }
            .transaction-item {
                page-break-inside: avoid;
                break-inside: avoid;
            }
            .statement-split {
                display: flex;
                flex-wrap: wrap;
                page-break-inside: avoid;
            }
            .split-left, .split-right {
                page-break-inside: avoid;
                break-inside: avoid;
            }
            /* A4 纸张设置 */
            @page {
                size: A4;
                margin: 1.5cm;
            }
            /* 打印时字体调整 */
            .statement-header h2 { font-size: 16pt; }
            .split-header { font-size: 11pt; background: #f0f0f0; }
            .transaction-item { font-size: 9pt; }
            .split-footer, .grand-total { font-size: 10pt; font-weight: bold; }
        }
    </style>
</head>
<body>

<!-- 登录页面 -->
<div id="loginPanel" class="login-overlay">
    <div class="login-card">
        <h1>教师联谊会</h1>
        <p>财务管理系统</p>
        <input type="password" id="passwordInput" class="login-input" placeholder="请输入访问密码" autofocus>
        <label class="checkbox-label"><input type="checkbox" id="showPasswordCheckbox"> 显示密码</label>
        <button id="loginBtn" class="login-btn">进入系统</button>
        <div id="loginError" class="error-msg"></div>
        <div style="font-size:0.7rem; margin-top:16px; color:#8faa83;">默认密码: admin123</div>
    </div>
</div>

<!-- 主系统 -->
<div class="main-content" id="mainContent">
<div class="container">
    <!-- 项目切换栏 -->
    <div class="card no-print">
        <div class="ledger-bar">
            <div class="ledger-selector" id="ledgerList"></div>
            <button id="addLedgerBtn" class="add-ledger">+ 新建项目</button>
        </div>
    </div>

    <!-- 录入卡片 -->
    <div class="card no-print">
        <div class="card-title">
            <span>记账录入</span>
            <span class="badge" id="currentLedgerName">当前: --</span>
        </div>
        <div class="form-grid">
            <div class="input-group"><label>发生日期</label><input type="date" id="transDate"></div>
            <div class="input-group"><label>类型</label><select id="transType"><option value="in">收取 (收入)</option><option value="out">支出 (付款)</option></select></div>
            <div class="input-group"><label>项目/摘要</label><input type="text" id="transDesc" placeholder="例: 会费/聚餐"></div>
            <div class="input-group"><label>金额 (RM)</label><input type="number" id="transAmount" step="0.01" placeholder="0.00"></div>
        </div>
        <div class="form-grid">
            <div class="input-group"><label>支付方式</label><select id="paymentMethod"><option value="TNG">TNG eWallet</option><option value="银行转账">银行转账</option><option value="现金">现金</option></select></div>
            <div class="input-group"><label>对方日期</label><input type="date" id="counterpartyDate"></div>
            <div class="input-group"><label>备注</label><input type="text" id="remark" placeholder="对方姓名/单据号"></div>
            <div class="input-group" style="flex:0.5"><button id="addBtn">+ 添加记录</button></div>
        </div>
    </div>

    <!-- 明细表 -->
    <div class="card no-print">
        <div class="card-title">
            <span>收支明细表</span>
            <span class="badge" id="recordCount">0 条</span>
        </div>
        <div class="filter-bar">
            <div class="filter-group">
                <select id="filterType"><option value="all">全部流水</option><option value="in">仅收取</option><option value="out">仅支出</option></select>
                <input type="text" id="searchKeyword" placeholder="摘要关键字">
                <select id="filterPaymentMethod"><option value="all">全部支付方式</option><option value="TNG">TNG</option><option value="银行转账">银行转账</option><option value="现金">现金</option></select>
                <button id="resetFilterBtn" class="btn-outline btn-sm">重置筛选</button>
            </div>
            <button id="clearCurrentLedgerBtn" class="btn-outline" style="background:#fff3e0;">清空当前项目</button>
        </div>
        <div class="table-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>日期</th><th>类型</th><th>摘要</th><th>金额 (RM)</th><th>支付方式</th><th>对方日期</th><th>备注</th><th>操作</th></tr>
                    </thead>
                    <tbody id="tableBody"><tr class="empty-row"><td colspan="8">暂无记录</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 结算单 Statement -->
    <div class="card">
        <div class="card-title">
            <span>收支结算单 (Statement)</span>
            <span class="badge no-print">单位: RM</span>
        </div>
        <div class="statement-modern" id="statementContainer">
            <div class="statement-header">
                <h2 id="statementTitle">教师联谊会</h2>
                <p>收支明细结算凭证</p>
                <div class="statement-period" id="statementDateRange"></div>
            </div>
            <div class="statement-split">
                <div class="split-left">
                    <div class="split-header">收取 (Receipts)</div>
                    <div id="inListContainer" class="transaction-list"><div class="empty-statement">暂无收取记录</div></div>
                    <div class="split-footer"><span>收取合计</span><span id="totalInAmount">RM 0.00</span></div>
                </div>
                <div class="split-right">
                    <div class="split-header">支出 (Payments)</div>
                    <div id="outListContainer" class="transaction-list"><div class="empty-statement">暂无支出记录</div></div>
                    <div class="split-footer"><span>支出合计</span><span id="totalOutAmount">RM 0.00</span></div>
                </div>
            </div>
            <div class="grand-total">
                <span>总收取: <strong id="grandTotalIn">RM 0.00</strong></span>
                <span>总支出: <strong id="grandTotalOut">RM 0.00</strong></span>
                <span>结余 (Balance): <strong id="balanceTotal">RM 0.00</strong></span>
            </div>
            <div class="print-actions no-print">
                <button id="printStatementBtn">🖨️ 打印结算单</button>
                <button id="refreshStatementBtn" class="btn-outline">刷新结算单</button>
            </div>
        </div>
    </div>
    
    <footer class="no-print">hakmilik@KEBIRUSJKCHWAJIN</footer>
</div>
</div>

<!-- 新建项目弹窗 -->
<div id="ledgerModal" class="modal">
    <div class="modal-content">
        <h3>新建项目</h3>
        <div class="input-group"><label>项目名称</label><input type="text" id="newLedgerName" placeholder="例如: 欢送会2026 / 周年庆"></div>
        <div class="modal-actions"><button id="cancelLedgerBtn" class="btn-outline">取消</button><button id="confirmLedgerBtn">创建</button></div>
    </div>
</div>

<script>
    const PRESET_PASSWORD = "admin123";
    
    let appData = { ledgers: [], transactions: [] };
    let currentLedgerId = null;
    const STORAGE_KEY = "multi_ledger_finance_v7";
    
    function loadAppData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if(stored) {
            try {
                appData = JSON.parse(stored);
                if(!appData.ledgers) appData.ledgers = [];
                if(!appData.transactions) appData.transactions = [];
            } catch(e) { initDefaultData(); }
        } else {
            initDefaultData();
        }
        if(appData.ledgers.length === 0) {
            appData.ledgers.push({ id: "ledger_main", name: "教师联谊会" });
            saveAppData();
        }
        if(!currentLedgerId || !appData.ledgers.find(l=>l.id===currentLedgerId)) {
            currentLedgerId = appData.ledgers[0].id;
        }
    }
    
    function initDefaultData() {
        appData.ledgers = [{ id: "ledger_main", name: "教师联谊会" }];
        appData.transactions = [
            { id: "t1", ledgerId: "ledger_main", date: "2026-04-01", type: "in", description: "第一季度会费", amount: 2450, paymentMethod: "银行转账", counterpartyDate: "2026-03-28", remark: "王老师等12人" },
            { id: "t2", ledgerId: "ledger_main", date: "2026-04-10", type: "out", description: "教师节鲜花", amount: 680.5, paymentMethod: "TNG", counterpartyDate: "2026-04-09", remark: "花店" },
            { id: "t3", ledgerId: "ledger_main", date: "2026-04-18", type: "out", description: "茶歇茶点", amount: 420, paymentMethod: "现金", counterpartyDate: "2026-04-17", remark: "超市" }
        ];
        saveAppData();
    }
    
    function saveAppData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    function generateId() { return Date.now() + "_" + Math.random().toString(36).substr(2, 6); }
    function getCurrentTransactions() { return appData.transactions.filter(t => t.ledgerId === currentLedgerId); }
    
    function addTransaction(ledgerId, date, type, desc, amount, payment, cpDate, remark) {
        if(!date){ alert("请选择日期"); return false; }
        if(!desc.trim()){ alert("请填写摘要"); return false; }
        if(isNaN(amount) || amount<=0){ alert("金额必须为正数 (RM)"); return false; }
        appData.transactions.push({
            id: generateId(), ledgerId, date, type, description: desc.trim(), amount: Number(amount),
            paymentMethod: payment, counterpartyDate: cpDate || "", remark: remark.trim()
        });
        saveAppData();
        return true;
    }
    
    function updateTransaction(id, fields) {
        let idx = appData.transactions.findIndex(t=>t.id===id);
        if(idx !== -1) { appData.transactions[idx] = {...appData.transactions[idx], ...fields}; saveAppData(); return true; }
        return false;
    }
    function deleteTransaction(id) { appData.transactions = appData.transactions.filter(t=>t.id!==id); saveAppData(); renderAll(); }
    function clearCurrentLedger() { 
        if(confirm(`⚠️ 确定要清空当前项目“${appData.ledgers.find(l=>l.id===currentLedgerId)?.name}”的所有记录吗？`)) {
            appData.transactions = appData.transactions.filter(t=>t.ledgerId !== currentLedgerId); 
            saveAppData(); 
            renderAll();
        }
    }
    
    function deleteLedger(ledgerId, ledgerName) {
        if(appData.ledgers.length === 1) { alert("至少需要保留一个项目"); return; }
        if(confirm(`⚠️ 确定删除项目“${ledgerName}”吗？该项目下的所有记录也会被删除！`)) {
            appData.transactions = appData.transactions.filter(t => t.ledgerId !== ledgerId);
            appData.ledgers = appData.ledgers.filter(l => l.id !== ledgerId);
            saveAppData();
            if(currentLedgerId === ledgerId) currentLedgerId = appData.ledgers[0].id;
            renderAll();
        }
    }
    
    function addLedger(name) {
        if(!name.trim()) { alert("请输入项目名称"); return false; }
        if(appData.ledgers.find(l=>l.name === name.trim())) { alert("项目名称已存在"); return false; }
        const newLedger = { id: generateId(), name: name.trim() };
        appData.ledgers.push(newLedger);
        saveAppData();
        renderLedgerBar();
        switchLedger(newLedger.id);
        return true;
    }
    
    function switchLedger(ledgerId) { currentLedgerId = ledgerId; renderAll(); }
    
    let currentFilter="all", currentKeyword="", currentPayFilter="all";
    function getFilteredTransactions() {
        let f = getCurrentTransactions();
        if(currentFilter !== "all") f = f.filter(t=>t.type===currentFilter);
        if(currentKeyword.trim()){ let kw=currentKeyword.toLowerCase(); f = f.filter(t=>t.description.toLowerCase().includes(kw)); }
        if(currentPayFilter !== "all") f = f.filter(t=>t.paymentMethod === currentPayFilter);
        f.sort((a,b)=> (a.date > b.date ? 1 : -1));
        return f;
    }
    
    function formatRM(amt) { return "RM " + amt.toFixed(2); }
    function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function renderLedgerBar() {
        const container = document.getElementById("ledgerList");
        let html = "";
        appData.ledgers.forEach(ledger => {
            const activeClass = currentLedgerId === ledger.id ? "active" : "";
            html += `<div class="ledger-item ${activeClass}">
                        <button class="ledger-name" data-id="${ledger.id}">${escapeHtml(ledger.name)}</button>
                        <button class="delete-ledger-btn" data-id="${ledger.id}" data-name="${escapeHtml(ledger.name)}">✕</button>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.ledger-name').forEach(btn => btn.addEventListener('click', () => switchLedger(btn.dataset.id)));
        document.querySelectorAll('.delete-ledger-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); deleteLedger(btn.dataset.id, btn.dataset.name); }));
        const currentLedgerObj = appData.ledgers.find(l=>l.id===currentLedgerId);
        document.getElementById("currentLedgerName").innerHTML = `当前: ${escapeHtml(currentLedgerObj?.name || "")}`;
        document.getElementById("statementTitle").innerHTML = escapeHtml(currentLedgerObj?.name || "账本");
    }
    
    function renderRecordsTable() {
        let filtered = getFilteredTransactions();
        let tbody = document.getElementById("tableBody");
        document.getElementById("recordCount").innerText = getCurrentTransactions().length + " 条";
        if(filtered.length===0){ tbody.innerHTML = '<tr class="empty-row"><td colspan="8">暂无记录</td></tr>'; return; }
        let html = "";
        filtered.forEach(r=>{
            let typeLabel = r.type==="in"?"收取":"支出";
            let amountClass = r.type==="in"?"amount-in":"amount-out";
            let sign = r.type==="in"?"+":"-";
            let cpDate = r.counterpartyDate || "—";
            html += `<tr>
                         <td>${r.date}</td>
                         <td>${typeLabel}</td>
                         <td>${escapeHtml(r.description)}</td>
                        <td class="${amountClass}">${sign} ${formatRM(r.amount)}</td>
                         <td><span class="payment-badge">${escapeHtml(r.paymentMethod)}</span></td>
                         <td>${cpDate}</td>
                         <td>${escapeHtml(r.remark) || "—"}</td>
                         <td><button class="action-btn edit-btn" data-id="${r.id}">修改</button><button class="action-btn delete-btn" data-id="${r.id}">删除</button></td>
                      </tr>`;
        });
        tbody.innerHTML = html;
        document.querySelectorAll('.edit-btn').forEach(btn=>btn.addEventListener('click',()=>{ openEditModal(btn.dataset.id); }));
        document.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click',()=>{ if(confirm("删除此记录？")){ deleteTransaction(btn.dataset.id); } }));
    }
    
    function renderStatement() {
        let all = getCurrentTransactions();
        all.sort((a,b)=> a.date > b.date ? 1 : -1);
        const inList = all.filter(t => t.type === "in");
        const outList = all.filter(t => t.type === "out");
        let totalIn = inList.reduce((s,i)=> s+i.amount,0);
        let totalOut = outList.reduce((s,i)=> s+i.amount,0);
        
        const inContainer = document.getElementById("inListContainer");
        if(inList.length===0) inContainer.innerHTML = '<div class="empty-statement">暂无收取记录</div>';
        else {
            let html = "";
            inList.forEach(item=>{
                let cpLine = item.counterpartyDate ? `<div class="item-remark">对方日期: ${item.counterpartyDate}</div>` : "";
                html += `<div class="transaction-item"><div class="item-left"><div class="item-date">${item.date}</div><div class="item-desc">${escapeHtml(item.description)}</div><span class="item-payment">${escapeHtml(item.paymentMethod)}</span>${cpLine}${item.remark?`<div class="item-remark">备注: ${escapeHtml(item.remark)}</div>`:''}</div><div class="item-right amount-positive">+ ${formatRM(item.amount)}</div></div>`;
            });
            inContainer.innerHTML = html;
        }
        const outContainer = document.getElementById("outListContainer");
        if(outList.length===0) outContainer.innerHTML = '<div class="empty-statement">暂无支出记录</div>';
        else {
            let html = "";
            outList.forEach(item=>{
                let cpLine = item.counterpartyDate ? `<div class="item-remark">对方日期: ${item.counterpartyDate}</div>` : "";
                html += `<div class="transaction-item"><div class="item-left"><div class="item-date">${item.date}</div><div class="item-desc">${escapeHtml(item.description)}</div><span class="item-payment">${escapeHtml(item.paymentMethod)}</span>${cpLine}${item.remark?`<div class="item-remark">备注: ${escapeHtml(item.remark)}</div>`:''}</div><div class="item-right amount-negative">- ${formatRM(item.amount)}</div></div>`;
            });
            outContainer.innerHTML = html;
        }
        document.getElementById("totalInAmount").innerHTML = formatRM(totalIn);
        document.getElementById("totalOutAmount").innerHTML = formatRM(totalOut);
        document.getElementById("grandTotalIn").innerHTML = formatRM(totalIn);
        document.getElementById("grandTotalOut").innerHTML = formatRM(totalOut);
        let balance = totalIn - totalOut;
        document.getElementById("balanceTotal").innerHTML = `<span style="color:${balance>=0?"#2b6e2f":"#c0392b"}">${formatRM(balance)}</span>`;
        let range = all.length ? `${all[0].date} 至 ${all[all.length-1].date}` : "暂无交易";
        document.getElementById("statementDateRange").innerHTML = `账期: ${range}  · 总笔数: ${all.length}`;
    }
    
    function renderAll(){ renderLedgerBar(); renderRecordsTable(); renderStatement(); }
    
    let editingId = null;
    function openEditModal(id){
        let rec = appData.transactions.find(t=>t.id===id);
        if(!rec) return;
        editingId = id;
        document.getElementById("editDate").value = rec.date;
        document.getElementById("editType").value = rec.type;
        document.getElementById("editDesc").value = rec.description;
        document.getElementById("editAmount").value = rec.amount;
        document.getElementById("editPaymentMethod").value = rec.paymentMethod;
        document.getElementById("editCounterpartyDate").value = rec.counterpartyDate || "";
        document.getElementById("editRemark").value = rec.remark || "";
        document.getElementById("editModal").style.display = "flex";
    }
    function closeModal(){ document.getElementById("editModal").style.display = "none"; editingId=null; }
    function saveEdit(){
        if(!editingId) return;
        let newDate = document.getElementById("editDate").value;
        let newType = document.getElementById("editType").value;
        let newDesc = document.getElementById("editDesc").value.trim();
        let newAmount = parseFloat(document.getElementById("editAmount").value);
        let newPayment = document.getElementById("editPaymentMethod").value;
        let newCpDate = document.getElementById("editCounterpartyDate").value;
        let newRemark = document.getElementById("editRemark").value;
        if(!newDate){ alert("日期不能为空"); return; }
        if(!newDesc){ alert("摘要不能为空"); return; }
        if(isNaN(newAmount)||newAmount<=0){ alert("金额需大于0"); return; }
        updateTransaction(editingId, { date:newDate, type:newType, description:newDesc, amount:newAmount, paymentMethod:newPayment, counterpartyDate:newCpDate, remark:newRemark });
        closeModal(); renderAll();
    }
    
    // 登录
    const loginPanel = document.getElementById("loginPanel"), mainContent = document.getElementById("mainContent");
    const passwordInput = document.getElementById("passwordInput"), loginBtn = document.getElementById("loginBtn");
    const loginError = document.getElementById("loginError"), showPwd = document.getElementById("showPasswordCheckbox");
    showPwd.addEventListener("change", ()=> passwordInput.type = showPwd.checked ? "text" : "password");
    function attemptLogin() {
        if(passwordInput.value === PRESET_PASSWORD) {
            loginPanel.style.display = "none";
            mainContent.style.display = "block";
            loadAppData();
            renderAll();
            bindEvents();
        } else { loginError.innerText = "密码错误"; passwordInput.value=""; showPwd.checked=false; passwordInput.type="password"; }
    }
    loginBtn.addEventListener("click", attemptLogin);
    passwordInput.addEventListener("keypress", e=>{ if(e.key==="Enter") attemptLogin(); });
    
    function bindEvents() {
        document.getElementById("addBtn").onclick = ()=>{
            let date = document.getElementById("transDate").value;
            let type = document.getElementById("transType").value;
            let desc = document.getElementById("transDesc").value;
            let amount = parseFloat(document.getElementById("transAmount").value);
            let payment = document.getElementById("paymentMethod").value;
            let cpDate = document.getElementById("counterpartyDate").value;
            let remark = document.getElementById("remark").value;
            if(addTransaction(currentLedgerId, date, type, desc, amount, payment, cpDate, remark)){
                document.getElementById("transDesc").value = "";
                document.getElementById("transAmount").value = "";
                document.getElementById("remark").value = "";
                document.getElementById("counterpartyDate").value = "";
                renderAll();
            }
        };
        document.getElementById("filterType").onchange = e=>{ currentFilter=e.target.value; renderRecordsTable(); };
        document.getElementById("searchKeyword").oninput = e=>{ currentKeyword=e.target.value; renderRecordsTable(); };
        document.getElementById("filterPaymentMethod").onchange = e=>{ currentPayFilter=e.target.value; renderRecordsTable(); };
        document.getElementById("resetFilterBtn").onclick = ()=>{ currentFilter="all"; currentKeyword=""; currentPayFilter="all"; document.getElementById("filterType").value="all"; document.getElementById("searchKeyword").value=""; document.getElementById("filterPaymentMethod").value="all"; renderRecordsTable(); };
        document.getElementById("clearCurrentLedgerBtn").onclick = clearCurrentLedger;
        document.getElementById("printStatementBtn").onclick = ()=> window.print();
        document.getElementById("refreshStatementBtn").onclick = ()=>{ renderStatement(); alert("结算单已刷新"); };
        document.getElementById("addLedgerBtn").onclick = ()=>{ document.getElementById("ledgerModal").style.display="flex"; document.getElementById("newLedgerName").value=""; };
        document.getElementById("cancelLedgerBtn").onclick = ()=> document.getElementById("ledgerModal").style.display="none";
        document.getElementById("confirmLedgerBtn").onclick = ()=>{ let name=document.getElementById("newLedgerName").value; if(addLedger(name)) document.getElementById("ledgerModal").style.display="none"; };
        document.getElementById("cancelEditBtn").onclick = closeModal;
        document.getElementById("saveEditBtn").onclick = saveEdit;
        window.onclick = (e)=>{ if(e.target === document.getElementById("editModal")) closeModal(); if(e.target === document.getElementById("ledgerModal")) document.getElementById("ledgerModal").style.display="none"; };
        document.getElementById("transDate").value = new Date().toISOString().slice(0,10);
    }
    
    const editModalHtml = `<div id="editModal" class="modal"><div class="modal-content"><h3>修改收支记录</h3><div class="form-grid"><div class="input-group"><label>日期</label><input type="date" id="editDate"></div><div class="input-group"><label>类型</label><select id="editType"><option value="in">收取</option><option value="out">支出</option></select></div><div class="input-group"><label>摘要</label><input type="text" id="editDesc"></div><div class="input-group"><label>金额 (RM)</label><input type="number" id="editAmount" step="0.01"></div></div><div class="form-grid"><div class="input-group"><label>支付方式</label><select id="editPaymentMethod"><option value="TNG">TNG</option><option value="银行转账">银行转账</option><option value="现金">现金</option></select></div><div class="input-group"><label>对方日期</label><input type="date" id="editCounterpartyDate"></div><div class="input-group"><label>备注</label><input type="text" id="editRemark"></div></div><div class="modal-actions"><button id="cancelEditBtn" class="btn-outline">取消</button><button id="saveEditBtn">保存修改</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend', editModalHtml);
    document.getElementById("transDate").value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
